<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Onboarding V1 · Continuous Radial Controls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/continuous.css" />
  </head>
  <body>
    <main id="continuous-app" class="shape-shell" aria-live="polite"></main>
    <script type="module">
      import("./src/continuous.js").catch((error) => {
        const app = document.querySelector("#continuous-app");
        if (app) {
          app.innerHTML = `<pre style="white-space:pre-wrap;color:#f4eee8;background:#171313;padding:24px;">${error.stack || error.message}</pre>`;
        }
        console.error(error);
      });
    </script>
  </body>
</html>
