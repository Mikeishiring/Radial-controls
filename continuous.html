<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Draw a preference profile through a continuous sequence of radial choices." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Continuous Profile · Radial Controls</title>
    <link rel="stylesheet" href="src/continuous.css" />
  </head>
  <body>
    <main id="continuous-app" class="shape-shell"></main>
    <script type="module">
      import("./src/continuous.js").catch((error) => {
        const app = document.querySelector("#continuous-app");
        if (app) {
          app.innerHTML = `<pre style="white-space:pre-wrap;color:#f4eee8;background:#171313;padding:24px;">${error.stack || error.message}</pre>`;
        }
        console.error(error);
      });
    </script>
  </body>
</html>
