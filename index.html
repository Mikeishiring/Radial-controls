<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Shape a compact preference profile with three direct-manipulation radial controls." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Preference Profile · Radial Controls</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell"></main>
    <script type="module">
      import("./src/app.js").catch((error) => {
        const app = document.querySelector("#app");
        if (app) {
          app.innerHTML = `<pre style="white-space:pre-wrap;color:#f1ece7;background:#171415;padding:24px;">${error.stack || error.message}</pre>`;
        }
        console.error(error);
      });
    </script>
  </body>
</html>
